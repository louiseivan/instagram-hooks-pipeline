name: instagram-refresh-signals

on:
  workflow_dispatch:   # manual trigger only

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scripts/instagram_scrape.py
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      - run: python scripts/instagram_classify.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - run: |
          git config user.name "instagram-hook-bot"
          git config user.email "bot@users.noreply.github.com"
          git add signals/
          git diff --cached --quiet || git commit -m "instagram signals refresh $(date +%F)"
          git push
